<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Tools & Techniques — Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{
  --bg:#F8F9FA;--sf:#FFFFFF;--sf2:#F3F4F6;--sf3:#E9EAEC;
  --tx:#111827;--tx2:#6B7280;--tx3:#9CA3AF;
  --bd:#E5E7EB;--bd2:#D1D5DB;
  --gn:#1D9E75;--gn-bg:#E1F5EE;--gn-bd:#5DCAA5;--gn-dk:#085041;--gn-md:#0F6E56;
  --or-bg:#FAEEDA;--or-bd:#EF9F27;--or-tx:#412402;
  --bl-bg:#EBF3FD;--bl-bd:#93C5FD;--bl-tx:#1E3A5F;
  --rd-bg:#FEECEC;--rd-bd:#FCA5A5;--rd-tx:#7F1D1D;
  --r:10px;--r-sm:7px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 16px rgba(0,0,0,.1),0 1px 4px rgba(0,0,0,.06);
  --sh-lg:0 8px 32px rgba(0,0,0,.14),0 2px 6px rgba(0,0,0,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);scroll-behavior:smooth}
body{font-family:"DM Sans",sans-serif;color:var(--tx);background:var(--bg);min-height:100vh}
.page{max-width:960px;margin:0 auto;padding:2rem 1.25rem 5rem}
.header{margin-bottom:2rem}
.hrow{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.logo{width:38px;height:38px;border-radius:10px;background:var(--gn);display:flex;align-items:center;justify-content:center;color:#fff;font-size:19px;box-shadow:0 2px 10px rgba(29,158,117,.3);flex-shrink:0}
.header h1{font-size:22px;font-weight:600;letter-spacing:-.4px}
.hsub{font-size:13.5px;color:var(--tx2);line-height:1.55;padding-left:50px}
.stats-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem}
.stat-pill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12.5px;font-weight:500;background:var(--sf);border:1px solid var(--bd);color:var(--tx2);box-shadow:var(--sh)}
.stat-pill strong{color:var(--tx);font-weight:600}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:flex-start}
.sw{position:relative;flex:1;min-width:200px}
.sw i.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--tx3);pointer-events:none}
#si{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--bd2);border-radius:var(--r-sm);font-size:13.5px;font-family:"DM Sans",sans-serif;background:var(--sf);color:var(--tx);outline:none;transition:border-color .15s,box-shadow .15s}
#si:focus{border-color:var(--gn);box-shadow:0 0 0 3px rgba(29,158,117,.12)}
#si::placeholder{color:var(--tx3)}
.sc{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:var(--sf3);border:none;cursor:pointer;color:var(--tx2);width:20px;height:20px;border-radius:50%;font-size:12px;display:none;align-items:center;justify-content:center}
.sc.vis{display:flex}
.sc:hover{background:var(--bd2);color:var(--tx)}
.fg{display:flex;gap:6px;flex-wrap:wrap}
.fb{padding:6px 13px;border-radius:20px;font-size:12.5px;border:1px solid var(--bd2);background:var(--sf);color:var(--tx2);cursor:pointer;transition:all .15s;white-space:nowrap}
.fb:hover{background:var(--sf2);color:var(--tx)}
.fb.act{background:var(--gn-bg);border-color:var(--gn-bd);color:var(--gn-dk);font-weight:500}
.ss{padding:6px 28px 6px 10px;border-radius:var(--r-sm);font-size:12.5px;border:1px solid var(--bd2);background:var(--sf);color:var(--tx2);font-family:"DM Sans",sans-serif;cursor:pointer;outline:none;appearance:none}
.sw2{position:relative}
.sw2::after{content:"\ea99";font-family:"tabler-icons";position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--tx3);pointer-events:none}
.rmeta{font-size:12.5px;color:var(--tx2);margin-bottom:.875rem}
.rmeta strong{color:var(--tx);font-weight:600}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.tc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 15px;cursor:pointer;transition:all .18s;box-shadow:var(--sh);display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden}
.tc::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;border-radius:var(--r) 0 0 var(--r);transition:background .18s}
.tc:hover{border-color:var(--gn-bd);box-shadow:var(--sh-md);transform:translateY(-1px)}
.tc:hover::before{background:var(--gn)}
.ctop{display:flex;align-items:flex-start;gap:8px}
.cicon{width:30px;height:30px;border-radius:8px;background:var(--gn-bg);border:1px solid var(--gn-bd);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--gn);font-size:15px}
.cname{font-size:14px;font-weight:600;color:var(--tx);line-height:1.3;flex:1}
.carr{font-size:14px;color:var(--tx3);opacity:0;transition:opacity .15s;margin-top:1px}
.tc:hover .carr{opacity:1}
.ctype{font-size:11.5px;color:var(--tx2);font-style:italic}
.ctags{display:flex;flex-wrap:wrap;gap:4px}
.ct{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap}
.cwhat{font-size:12.5px;color:var(--tx2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cat-integration{background:#EDE9FE;color:#3730A3;border:1px solid #C4B5FD}
.cat-scope{background:var(--bl-bg);color:var(--bl-tx);border:1px solid var(--bl-bd)}
.cat-schedule{background:#FEF3C7;color:#78350F;border:1px solid #FDE68A}
.cat-cost{background:#DCFCE7;color:#14532D;border:1px solid #86EFAC}
.cat-quality{background:var(--rd-bg);color:var(--rd-tx);border:1px solid var(--rd-bd)}
.cat-resource{background:#FFF1F2;color:#881337;border:1px solid #FECDD3}
.cat-communication{background:#F0F9FF;color:#0C4A6E;border:1px solid #BAE6FD}
.cat-risk{background:var(--or-bg);color:var(--or-tx);border:1px solid var(--or-bd)}
.cat-procurement{background:#F0FDF4;color:#14532D;border:1px solid #86EFAC}
.cat-stakeholder{background:#FDF4FF;color:#581C87;border:1px solid #E9D5FF}
.cat-agile{background:var(--gn-bg);color:var(--gn-dk);border:1px solid var(--gn-bd)}
.cat-facilitation{background:#F8FAFC;color:#334155;border:1px solid #CBD5E1}
.empty{text-align:center;padding:4rem 1rem;color:var(--tx2);grid-column:1/-1}
.empty i{font-size:36px;display:block;margin-bottom:12px;color:var(--tx3)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:300;display:none;justify-content:flex-end;backdrop-filter:blur(2px)}
.ov.open{display:flex}
.dr{width:min(480px,95vw);height:100vh;background:var(--sf);border-left:1px solid var(--bd);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:var(--sh-lg)}
.ov.open .dr{transform:translateX(0)}
.dhead{border-bottom:1px solid var(--bd);flex-shrink:0}
.dht{padding:14px 16px;display:flex;align-items:center;gap:10px;background:var(--sf2)}
.dico{width:38px;height:38px;border-radius:10px;background:var(--gn-bg);border:1px solid var(--gn-bd);display:flex;align-items:center;justify-content:center;color:var(--gn);font-size:18px;flex-shrink:0}
.dtit{font-size:16px;font-weight:600;color:var(--tx);line-height:1.2;flex:1}
.dcl{background:transparent;border:none;cursor:pointer;color:var(--tx2);padding:6px;border-radius:var(--r-sm);display:flex;align-items:center;font-size:18px;transition:background .15s}
.dcl:hover{background:var(--sf3);color:var(--tx)}
.dmeta{padding:10px 16px;display:flex;gap:6px;flex-wrap:wrap;background:var(--sf)}
.dbody{flex:1;overflow-y:auto;padding:18px 18px 32px;scroll-behavior:smooth}
.dbody::-webkit-scrollbar{width:4px}
.dbody::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.ds{margin-bottom:1.4rem}
.ds:last-child{margin-bottom:0}
.dst{font-size:11px;font-weight:600;letter-spacing:.55px;text-transform:uppercase;color:var(--tx2);margin-bottom:9px;display:flex;align-items:center;gap:6px}
.dst i{font-size:14px;color:var(--gn)}
.dsb{font-size:13.5px;color:var(--tx);line-height:1.68}
.dv{height:1px;background:var(--bd);margin:1.25rem 0}
.dt{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12.5px;margin:3px 3px 3px 0;line-height:1.35}
.dt-w{background:var(--bl-bg);color:var(--bl-tx);border:1px solid var(--bl-bd)}
.dt-a{background:var(--rd-bg);color:var(--rd-tx);border:1px solid var(--rd-bd)}
.dt-c{background:var(--gn-bg);color:var(--gn-dk);border:1px solid var(--gn-bd);cursor:pointer}
.dt-c:hover{background:var(--gn-bd);color:#fff}
.sl{list-style:none;counter-reset:st}
.sl li{counter-increment:st;display:flex;gap:10px;margin-bottom:9px;font-size:13.5px;line-height:1.55;color:var(--tx)}
.sl li::before{content:counter(st);min-width:22px;height:22px;border-radius:50%;background:var(--gn-bg);color:var(--gn-dk);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;border:1px solid var(--gn-bd)}
.ex{background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r-sm);padding:12px 14px;font-size:13.5px;line-height:1.65;color:var(--tx)}
.pmp{background:var(--or-bg);border-left:3px solid var(--or-bd);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:10px 13px;font-size:13px;color:var(--or-tx);line-height:1.6}
.ph{padding:1.5rem 1rem;font-size:13.5px;color:var(--tx2);line-height:1.65}
.footer{margin-top:3rem;text-align:center;font-size:12px;color:var(--tx3);padding-top:1rem;border-top:1px solid var(--bd)}

/* App button — card */
.app-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:var(--r-sm);
  font-size:12px;font-weight:600;
  border:none;
  background:var(--gn);color:#fff;
  cursor:pointer;transition:all .18s;white-space:nowrap;
  box-shadow:0 1px 4px rgba(29,158,117,.35);
  text-decoration:none;letter-spacing:.01em;
}
.app-btn:hover{background:#168a62;box-shadow:0 2px 8px rgba(29,158,117,.45);transform:translateY(-1px)}
.app-btn:active{transform:translateY(0);box-shadow:none}
.app-btn.planned{
  background:var(--sf2);color:var(--tx2);
  border:1px dashed var(--bd2);box-shadow:none;
}
.app-btn.planned:hover{background:var(--sf3);color:var(--tx);transform:none;box-shadow:none}
/* App button — drawer */
.app-btn-lg{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 20px;border-radius:var(--r-sm);
  font-size:13.5px;font-weight:600;
  border:none;
  background:var(--gn);color:#fff;
  cursor:pointer;transition:all .18s;width:100%;
  box-shadow:0 2px 8px rgba(29,158,117,.3);
  text-decoration:none;letter-spacing:.01em;
  margin-bottom:8px;
}
.app-btn-lg:hover{background:#168a62;box-shadow:0 4px 14px rgba(29,158,117,.4);transform:translateY(-1px)}
.app-btn-lg:active{transform:translateY(0)}
.app-btn-lg.planned{
  background:var(--sf2);color:var(--tx2);
  border:1px dashed var(--bd2);box-shadow:none;
  font-weight:500;
}
.app-btn-lg.planned:hover{background:var(--sf3);color:var(--tx);transform:none;box-shadow:none}
/* Toast popup */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:var(--r-sm);font-size:13px;font-weight:500;z-index:999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="hrow">
      <div class="logo"><i class="ti ti-books"></i></div>
      <h1>PM Tools &amp; Techniques — Reference</h1>
    </div>
    <p class="hsub">Tra cứu đầy đủ tools &amp; techniques trong PMP. Click vào bất kỳ tool nào để xem hướng dẫn thực chiến.</p>
  </div>
  <div class="stats-bar" id="sb"></div>
  <div class="toolbar">
    <div class="sw">
      <i class="ti ti-search si"></i>
      <input type="text" id="si" placeholder="Tìm theo tên, mô tả, category...">
      <button class="sc" id="sc" title="Xoá"><i class="ti ti-x"></i></button>
    </div>
    <div class="fg" id="fg"></div>
    <div class="sw2"><select class="ss" id="ss" onchange="render()">
      <option value="alpha">A → Z</option>
      <option value="cat">Theo Category</option>
      <option value="type">Theo Type</option>
    </select></div>
  </div>
  <div class="rmeta" id="rm"></div>
  <div class="grid" id="grid"></div>
  <div class="footer">PM Tools &amp; Techniques Reference · PMP 7th Edition · v1.1 · Update data trong TOOLS_DATA array</div>
</div>
<div class="ov" id="ov" onclick="maybeClose(event)">
  <div class="dr">
    <div class="dhead">
      <div class="dht">
        <div class="dico"><i class="ti ti-book-2"></i></div>
        <div class="dtit" id="dtit">Tool Guide</div>
        <button class="dcl" onclick="closeD()"><i class="ti ti-x"></i></button>
      </div>
      <div class="dmeta" id="dm"></div>
    </div>
    <div class="dbody" id="db"></div>
  </div>
</div>
<script>
/* ==========================================================
   CATEGORIES — thêm category: { key, label }
   + thêm CSS .cat-<key> trong <style>
   ========================================================== */
const CATS = [
  {key:"integration",  label:"Integration"},
  {key:"scope",        label:"Scope"},
  {key:"schedule",     label:"Schedule"},
  {key:"cost",         label:"Cost"},
  {key:"quality",      label:"Quality"},
  {key:"resource",     label:"Resource & Team"},
  {key:"communication",label:"Communication"},
  {key:"risk",         label:"Risk"},
  {key:"procurement",  label:"Procurement"},
  {key:"stakeholder",  label:"Stakeholder"},
  {key:"agile",        label:"Agile"},
  {key:"facilitation", label:"Facilitation"},
];

/* ==========================================================
   TOOLS DATA
   Mỗi tool = 1 object. Để thêm/xoá/sửa chỉ cần edit object này.
   Fields: id*, name*, type*, cats*, icon*, what*, when, avoid, steps, combine, example, pmpNote
   (*) = required
   ========================================================== */
const TD = [
  // ── INTEGRATION ──
  {id:"expert-judgment",name:"Expert Judgment",type:"Technique",cats:["integration","scope","schedule","cost","risk","facilitation"],icon:"ti-user-check",
   what:"Tham vấn ý kiến từ người có chuyên môn — internal SME, external consultant, hoặc chính PM dựa trên kinh nghiệm.",
   when:["Cần quyết định nhanh mà không đủ data","Estimate cost/schedule khi chưa có precedent","Evaluate technical options ngoài tầm PM"],
   avoid:["Thay thế hoàn toàn data-driven analysis khi data có sẵn","Chỉ hỏi 1 expert cho quyết định high-stakes"],
   steps:["Xác định rõ câu hỏi cần expert trả lời","Chọn expert: domain knowledge + không conflict of interest","Chuẩn bị context đầy đủ","Document recommendation và rationale","Cross-validate với ít nhất 1 expert khác nếu high-stakes"],
   combine:["meetings","mcda","pert"],
   example:"PM estimate module AI mới → mời Tech Lead + external consultant → record estimate range + assumptions → dùng PERT để ra con số chính thức.",
   pmpNote:"Expert Judgment xuất hiện trong hầu hết processes. PMP hay hỏi 'PM nên làm gì đầu tiên?' — Expert Judgment thường là bước đầu khi chưa có thông tin."},

  {id:"meetings",name:"Meetings & Facilitation",type:"Technique",cats:["integration","communication","facilitation"],icon:"ti-users",
   what:"Structured meeting với agenda rõ ràng, facilitator điều phối, output cụ thể. Kỹ thuật có chủ đích, không phải mọi cuộc họp.",
   when:["Cần align nhiều stakeholder cùng lúc","Giải quyết conflict hoặc ambiguity","Kick-off, retrospective, decision-making sessions"],
   avoid:["Meeting không có agenda","Meeting không có action items và owner","Meeting thay thế async update khi không cần real-time"],
   steps:["Set mục tiêu: output cần đạt là gì?","Gửi agenda trước ít nhất 24h","Assign facilitator và timekeeper","Park off-topic vào Parking Lot","Close: decisions + action items + owner + deadline"],
   combine:["expert-judgment","mcda","timeboxing"],
   example:"Sprint Planning: PM gửi agenda trước, timebox 2h cho 2-week sprint, team vote story points, close với sprint goal + commitment.",
   pmpNote:"No agenda = no meeting. Mọi meeting cần Purpose + Agenda + Owner + Timebox."},

  {id:"mcda",name:"MCDA - Multicriteria Decision Analysis",type:"Tool",cats:["integration","scope","procurement","stakeholder"],icon:"ti-table",
   what:"Multicriteria Decision Analysis — ra quyết định khi có nhiều lựa chọn và nhiều tiêu chí. Assign weight, score, tính weighted total.",
   when:["Vendor selection","Technology stack decision","Prioritize competing project options"],
   avoid:["Dùng cho quyết định đơn giản — overkill","Assign weight tuỳ tiện không có stakeholder agreement"],
   steps:["List tất cả options","Xác định criteria (cost, risk, time, quality...)","Assign weight % — tổng = 100%","Score từng option (1–10)","Tính weighted score = score x weight","Option có total cao nhất = recommended","Document rationale"],
   combine:["expert-judgment","meetings","risk-matrix"],
   example:"Chọn cloud vendor: Criteria = Cost 30%, Security 25%, Support 20%, Scalability 25%. Score AWS vs Azure vs GCP → present kết quả với sponsor.",
   pmpNote:"MCDA đặc biệt hữu ích để tránh bias và có thể defend với sponsor bằng data."},

  {id:"change-control",name:"Change Control Tools",type:"Tool",cats:["integration"],icon:"ti-git-branch",
   what:"Hệ thống quy trình submit, evaluate, approve/reject thay đổi về scope/schedule/cost. Gồm CR form, CCB, change log.",
   when:["Bất kỳ thay đổi nào so với approved baseline","Stakeholder yêu cầu thêm feature","Phát hiện deviation trong execution"],
   avoid:["Approve change verbally không có documentation","Bypass CCB vì urgent","Implement trước khi có formal approval"],
   steps:["Submit CR form: mô tả + justification","PM thực hiện Impact Analysis","Submit lên CCB/Sponsor","CCB approve/reject/defer","Nếu approve: update baselines + notify team","Log tất cả CR vào Change Log"],
   combine:["impact-analysis","variance-analysis"],
   example:"Client yêu cầu thêm dashboard giữa sprint → CR → estimate 5 man-days → impact: push go-live 1 tuần → CCB approve → update baseline.",
   pmpNote:"Mọi thay đổi đều qua Integrated Change Control — kể cả từ Sponsor."},

  {id:"impact-analysis",appUrl:"#",name:"Impact Analysis",type:"Technique",cats:["integration"],icon:"ti-arrows-split",
   what:"Phân tích có hệ thống tác động của thay đổi hoặc sự kiện lên scope, cost, schedule, quality, risk, resources.",
   when:["Trước khi approve bất kỳ change request","Khi risk materializes","Evaluate competing priorities"],
   avoid:["Bỏ qua ripple effects","Estimate một mình — cần input từ tech lead và QA"],
   steps:["Mô tả rõ thay đổi","Đánh giá impact lên Scope, Schedule, Cost, Quality, Risk","Consult SME từng domain","Document findings với số liệu","Present cho decision maker"],
   combine:["change-control","expert-judgment"],
   example:"Migrate DB giữa dự án → +15 ngày, +$8K, regression risk tăng → present sponsor → defer sang Phase 2."},

  {id:"lessons-learned",name:"Lessons Learned Register",type:"Tool",cats:["integration"],icon:"ti-notebook",
   what:"Tài liệu ghi lại những gì đã làm tốt, chưa tốt, và improvement actions. Knowledge asset của tổ chức.",
   when:["Liên tục trong suốt dự án — không chỉ ở closing","Sau mỗi milestone hoặc sprint","Khi xảy ra sự cố"],
   avoid:["Chỉ capture ở cuối dự án — quá muộn","Ghi chung chung không actionable"],
   steps:["Sau mỗi milestone: session 30–45 phút","3 câu: What went well? What did not? What to improve?","Ghi: situation + impact + recommendation","Assign owner cho improvement actions","Archive vào PMIS","Review trước khi start project tương tự"],
   combine:["retrospective","meetings"],
   example:"Sau UAT: 40% defects do requirement ambiguous → Lesson: Requirement Walkthrough sau mỗi sprint planning.",
   pmpNote:"PMP mantra: Capture lessons learned early and continuously."},

  {id:"variance-analysis",name:"Variance Analysis",type:"Technique",cats:["integration","schedule","cost"],icon:"ti-chart-line",
   what:"So sánh actual performance với baseline để xác định variance và nguyên nhân.",
   when:["Monitoring & Controlling phase","Phát hiện deviation so với plan","Báo cáo performance cho stakeholders"],
   avoid:["Report variance mà không analyze root cause","Focus vào variance nhỏ — prioritize variance có impact lớn"],
   steps:["Thu thập actual data","So sánh với baseline","Tính SV và CV","Analyze root cause của variances đáng kể","Implement corrective/preventive actions","Update forecast"],
   combine:["evm","change-control"],
   example:"Tuần 8: Actual $85K vs Baseline $75K → CV = -$10K → root cause: integration complexity → CR để adjust."},

  // ── SCOPE ──
  {id:"interviews",name:"Interviews",type:"Technique",cats:["scope","stakeholder"],icon:"ti-message-dots",
   what:"Trao đổi trực tiếp 1-1 hoặc nhóm nhỏ để elicit requirements, gather information, understand stakeholder needs.",
   when:["Elicit requirements từ key stakeholders","Understand pain points","Sensitive topics không discuss được trong group"],
   avoid:["Leading questions: 'Bạn có muốn feature X không?' — bias kết quả","Không có structure — để cuộc phỏng vấn đi lạc"],
   steps:["Chuẩn bị interview guide với open-ended questions","Start với context và mục tiêu","Funnel approach: broad đến specific","Active listening — không interrupt","Probe: Why? và Can you give an example?","Summarize lại cuối buổi","Send follow-up notes để validate"],
   combine:["workshops","prototyping"],
   example:"Kick-off ERP: PM phỏng vấn từng department head → consolidate → identify top 5 must-have trước khi workshop."},

  {id:"workshops",name:"Workshops (JAD)",type:"Technique",cats:["scope","facilitation"],icon:"ti-users-group",
   what:"Joint Application Design — session nhóm có cấu trúc để align nhiều stakeholder về requirements/design trong thời gian ngắn.",
   when:["Cần align nhiều stakeholders","Accelerate requirement gathering","Giải quyết conflicting requirements"],
   avoid:["Chạy khi key decision makers vắng mặt","Không có agenda","Quá nhiều người: trên 12 khó facilitate"],
   steps:["Define rõ mục tiêu: output là gì?","Invite đúng người: decision makers + SMEs","Chuẩn bị materials","Assign: Facilitator, Scribe, Timekeeper","Use: brainstorming → dot voting → prioritization","Document outputs ngay","Distribute notes trong 24h"],
   combine:["ngt","prototyping","meetings"],
   example:"B2B platform: 1-day workshop → map AS-IS → design TO-BE → MoSCoW → approved feature list.",
   pmpNote:"JAD sessions đặc biệt hiệu quả khi stakeholders có conflicting requirements — tất cả ngồi lại với nhau."},

  {id:"prototyping",name:"Prototyping",type:"Technique",cats:["scope"],icon:"ti-device-desktop",
   what:"Tạo mô hình sơ bộ (clickable mockup, wireframe) để validate requirements và design trước khi build thật.",
   when:["Requirements mơ hồ, business chưa hình dung được output","High-risk UI/UX decisions","Muốn get early feedback nhanh"],
   avoid:["Prototype quá polished → stakeholder tưởng đã done","Skip prototyping vì mất thời gian → tốn nhiều hơn khi rebuild"],
   steps:["Identify phần cần prototype","Chọn fidelity: sketch → wireframe → clickable","Demo: 'Đây là prototype, chưa phải real'","Collect feedback: What works? What is missing?","Iterate 2–3 rounds","Finalize → handoff dev team"],
   combine:["interviews","workshops"],
   example:"IoT dashboard → Figma prototype 2 ngày → demo 5 users → 3 UX issues phát hiện sớm → fix trước khi code."},

  {id:"ngt",name:"Nominal Group Technique",type:"Technique",cats:["scope","facilitation"],icon:"ti-notes",
   what:"Brainstorming có cấu trúc để thu thập ý kiến bình đẳng, tránh dominant voices chi phối. Viết tắt NGT.",
   when:["Group có power dynamics","Cần prioritize nhiều options khách quan","Tránh groupthink"],
   avoid:["Dùng khi cần speed — chậm hơn brainstorming thường","Không giải thích quy trình trước"],
   steps:["Đặt câu hỏi rõ ràng","Silent generation: tự viết 5–10 phút","Round-robin: từng người đọc 1 ý, ghi lên board","Clarification: Q&A ngắn, không debate","Voting: vote top 3–5 ý","Tally → rank → discuss"],
   combine:["workshops","brainstorming"],
   example:"Chọn tech stack, senior có tendency dominate → NGT → junior đề xuất solution được vote cao nhất → adopted.",
   pmpNote:"NGT hiệu quả trong môi trường có hierarchy — mọi người có tiếng nói bình đẳng."},

  {id:"wbs",appUrl:"",name:"WBS",type:"Tool",cats:["scope","schedule"],icon:"ti-sitemap",
   what:"Work Breakdown Structure — cấu trúc phân cấp tất cả deliverables thành Work Packages có thể estimate, assign và track.",
   when:["Planning phase — bắt buộc trong Waterfall","Cần bottom-up estimate","Cần clarity về scope với stakeholders"],
   avoid:["WBS dựa trên activities thay vì deliverables","Work Package quá lớn: trên 80h hoặc 2 tuần","Không được stakeholder review"],
   steps:["Level 1: Project Deliverable","Level 2: major deliverables (phases/components)","Decompose đến khi WP đủ nhỏ để estimate và assign","Assign WBS code (1.1, 1.1.1...)","Tạo WBS Dictionary: mô tả, owner, acceptance criteria","Scope baseline = WBS + Dictionary"],
   combine:["bottom-up","cpm"],
   example:"Mobile app: L2 = UI, Backend, QA, Deploy. L3 = Login screen, Home screen... Mỗi screen = 1 WP với estimate riêng.",
   pmpNote:"Không có WBS = không có scope baseline = không có change control hiệu quả."},

  {id:"rolling-wave",name:"Rolling Wave Planning",type:"Technique",cats:["scope","schedule"],icon:"ti-wave-sine",
   what:"Plan chi tiết cho giai đoạn sắp tới, high-level cho xa hơn. Khi tiến gần hơn thì plan chi tiết thêm.",
   when:["Dự án dài với nhiều uncertainty","Requirements sẽ rõ dần theo thời gian","Hybrid projects"],
   avoid:["Khi scope phải fixed từ đầu (fixed-price contract)","Không update khi có thông tin mới"],
   steps:["Plan chi tiết cho 1–2 phases tiếp theo","Plan high-level cho phases xa hơn","Sau mỗi phase: refine plan cho phase tiếp theo","Update WBS và schedule"],
   combine:["wbs","agile-backlog"],
   pmpNote:"Rolling wave = progressive elaboration trong practice. Phổ biến trong Hybrid và large Agile programs."},

  // ── SCHEDULE ──
  {id:"pert",appUrl:"#",name:"Three-point Estimating (PERT)",type:"Tool",cats:["schedule","cost"],icon:"ti-math",
   what:"Estimation dùng 3 điểm: Optimistic (O), Most Likely (M), Pessimistic (P). Formula: E = (O + 4M + P) / 6.",
   when:["Uncertainty cao, chưa có precedent","Cần communicate estimate range","Schedule/cost có risk cao"],
   avoid:["Dùng cho tasks đơn giản — overkill","Bỏ qua P (pessimistic)"],
   steps:["Gather O, M, P cho mỗi task","Tính E = (O + 4M + P) / 6","Tính SD = (P - O) / 6","Range 95%: E ± 2 x SD","Sum lên project level","Dùng để set baseline và contingency"],
   combine:["bottom-up","cpm","monte-carlo"],
   example:"Payment gateway: O=3d, M=5d, P=12d → E=5.8d, SD=1.5 → 95% range: 2.8–8.8d → PM schedule 7 days.",
   pmpNote:"Công thức PERT hay ra trong exam: E = (O + 4M + P) / 6. SD = (P - O) / 6. 1σ=68%, 2σ=95%, 3σ=99.7%."},

  {id:"cpm",appUrl:"#",name:"Critical Path Method (CPM)",type:"Tool",cats:["schedule"],icon:"ti-route",
   what:"Xác định chuỗi task dài nhất trong network — Critical Path có zero float. Delay trên CP = project delay.",
   when:["Planning — bắt buộc trong Waterfall","Xác định tasks quan trọng nhất để monitor","Schedule compression"],
   avoid:["Ignore near-critical paths (float dưới 3 ngày)","Không update khi scope/resource thay đổi"],
   steps:["List activities và dependencies","Estimate duration","Build network diagram (PDM)","Forward Pass: tính ES và EF","Backward Pass: tính LS và LF","Float = LS - ES. Float = 0 → Critical Path","Highlight CP → monitor daily"],
   combine:["fast-tracking","crashing","pert"],
   example:"Dự án 6 tháng: CP = Req→Design→Backend→Integration→UAT. UI có 2-week float → PM flex resource sang Backend.",
   pmpNote:"Float = LS-ES = LF-EF. Critical Path có float = 0. Near-critical path cũng cần monitor."},

  {id:"fast-tracking",name:"Fast Tracking",type:"Technique",cats:["schedule"],icon:"ti-player-play",
   what:"Chạy song song activities vốn sequential để rút ngắn timeline. Ví dụ: coding khi design chưa 100% xong.",
   when:["Schedule slipping và cần recover time","Cần hit hard deadline"],
   avoid:["Fast track tasks có hard dependency","Không tăng communication → rework"],
   steps:["Identify activities trên CP có thể overlap","Assess risk của overlap","Tăng coordination: daily sync","Define clear handoff criteria","Monitor closely — fast tracking tăng risk rework"],
   combine:["crashing","cpm"],
   example:"Mobile app chậm 3 tuần: Fast track Backend song song với UI → save 2 tuần → tăng daily sync.",
   pmpNote:"Fast Tracking: schedule giảm, risk tăng. Crashing: schedule giảm, cost tăng. Không có free lunch."},

  {id:"crashing",name:"Crashing",type:"Technique",cats:["schedule"],icon:"ti-brand-speedtest",
   what:"Thêm resources vào critical path activities để rút ngắn duration. Trade-off: schedule giảm, cost tăng.",
   when:["Cần compress schedule và có budget","Fast tracking không khả thi"],
   avoid:["Crash non-critical path activities — waste of money","Assume thêm người = proportionally faster (Brooks's Law)"],
   steps:["Identify CP tasks có thể speed up với thêm resource","Tính crash cost/day = (Crash Cost - Normal Cost) / (Normal Dur - Crash Dur)","Rank theo crash cost/day thấp đến cao","Crash task rẻ nhất trước","Re-check CP sau mỗi crash"],
   combine:["fast-tracking","cpm"],
   example:"QA 4 tuần trên CP, cần 2 tuần: thêm 2 QA ($4K) → rút 12 ngày → $333/day saved vs penalty $2K/day.",
   pmpNote:"Crash Point = điểm mà thêm resource không giảm thêm được thời gian."},

  {id:"bottom-up",appUrl:"#",name:"Bottom-up Estimating",type:"Technique",cats:["schedule","cost"],icon:"ti-stack-3",
   what:"Estimate từ Work Packages (lowest level of WBS) rồi aggregate lên. Accurate nhất nhưng tốn thời gian nhất.",
   when:["Cần high accuracy","Project có WBS chi tiết","Fixed-price contract"],
   avoid:["Dùng khi project còn concept stage — chưa đủ detail","Skip expert input cho complex tasks"],
   steps:["Ensure WBS đến Work Package level","Estimate mỗi WP: Three-point hoặc expert judgment","Include: labor + materials + equipment + overhead","Aggregate: WP → Control Account → Project Total","Add contingency","Document assumptions"],
   combine:["wbs","pert","expert-judgment"],
   example:"47 WPs → aggregate = 2,340h / $186K. Contingency $28K. Total $214K."},

  {id:"analogous",appUrl:"#",name:"Analogous Estimating",type:"Technique",cats:["schedule","cost"],icon:"ti-copy",
   what:"Top-down estimate dựa trên data từ similar past projects. Nhanh nhưng kém accurate hơn bottom-up.",
   when:["Early stage — chưa đủ detail","Quick estimate cần ngay","Project tương tự đã làm trước"],
   avoid:["Dùng khi project có significant differences so với precedent","Không document assumptions về similarities"],
   steps:["Identify similar past projects có recorded data","Assess degree of similarity","Apply analogy với adjustment factors","Document assumptions","Communicate range và uncertainty"],
   combine:["expert-judgment","parametric"],
   pmpNote:"Analogous = fastest, least accurate. Bottom-up = slowest, most accurate. Parametric ở giữa."},

  {id:"parametric",appUrl:"#",name:"Parametric Estimating",type:"Technique",cats:["schedule","cost"],icon:"ti-calculator",
   what:"Estimate dựa trên statistical relationship giữa historical data và project variables. Ví dụ: $X per function point.",
   when:["Có historical data với clear unit rate","Project có repetitive elements","Cần accurate hơn analogous nhưng nhanh hơn bottom-up"],
   avoid:["Dùng khi unit rate không stable","Apply parameters từ industry khác mà không adjust"],
   steps:["Identify measurable parameters (screens, API endpoints...)","Collect historical unit rates","Validate rates với expert judgment","Apply: Total = Unit Rate x Quantity","Add complexity adjustment factors","Document assumptions"],
   combine:["expert-judgment","analogous"],
   example:"Past: 3 days/screen. New app: 24 screens → 72 days. 3 complex screens x 1.5 → revised 78 days."},

  // ── COST ──
  {id:"evm",appUrl:"#",name:"Earned Value Management",type:"Tool",cats:["cost","schedule"],icon:"ti-chart-bar",
   what:"EVM — Framework đo lường performance tích hợp scope + schedule + cost. Dùng PV, EV, AC để tính metrics.",
   when:["Monitoring & Controlling — dùng liên tục","Report performance cho sponsor","Forecast completion cost và date"],
   avoid:["Báo cáo chỉ % complete mà không có EV","Confuse EV với AC: EV = value of work done, AC = actual cost"],
   steps:["Setup: xác định BAC và baseline schedule","Mỗi period: tính PV, EV, AC","Variances: CV = EV-AC, SV = EV-PV","Indices: CPI = EV/AC, SPI = EV/PV","Forecast: EAC = BAC/CPI","Report với trend graph"],
   combine:["variance-analysis","reserve-analysis"],
   example:"Week 10/20, BAC=$100K: PV=$50K, EV=$40K, AC=$48K → CPI=0.83, SPI=0.8 → EAC=$120K → báo sponsor over $20K.",
   pmpNote:"Nhớ 7 metrics: PV, EV, AC, CV, SV, CPI, SPI + 3 forecasts: EAC, ETC, TCPI."},

  {id:"reserve-analysis",name:"Reserve Analysis",type:"Technique",cats:["cost","risk"],icon:"ti-shield-check",
   what:"Xác định Contingency Reserve (known unknowns) và Management Reserve (unknown unknowns) cho budget và schedule.",
   when:["Cost estimation và budgeting","Schedule estimation","Risk response planning"],
   avoid:["Không phân biệt Contingency vs Management Reserve","Set reserve quá thấp vì áp lực budget"],
   steps:["Review Risk Register: identify known unknowns","Tính EMV = P x I cho mỗi risk","Sum EMV = minimum contingency","Add buffer cho complexity (10–20%)","Contingency = trong cost baseline, PM có authority dùng","Management Reserve = ngoài baseline, cần Sponsor approval"],
   combine:["evm","risk-matrix","expert-judgment"],
   example:"Project $200K: EMV $18K + 10% buffer $20K = Contingency $38K. Management Reserve 5% = $10K. Total = $248K.",
   pmpNote:"Contingency Reserve nằm TRONG cost baseline. Management Reserve nằm NGOÀI baseline nhưng trong project budget."},

  // ── QUALITY ──
  {id:"fishbone",appUrl:"#",name:"Fishbone Diagram",type:"Tool",cats:["quality"],icon:"ti-git-fork",
   what:"Cause-and-Effect (Ishikawa) Diagram — hình xương cá để analyze tất cả possible causes theo 6M categories.",
   when:["Root cause analysis sau defect/issue","Process improvement workshop","Prevent future problems"],
   avoid:["Stop ở symptoms, không đào sâu root causes","Thiếu categories — miss potential causes"],
   steps:["Write problem statement ở đầu xương sống bên phải","Draw 6 bones: Machine, Method, Material, Man, Measurement, Environment","Brainstorm cho mỗi category","Dùng 5 Whys để đào sâu","Identify root causes có khả năng cao nhất","Develop action plan"],
   combine:["pareto","brainstorming"],
   example:"15% login failure: Method/Code/Infrastructure/Testing → Root cause: no load testing → add performance test gate.",
   pmpNote:"Còn gọi là Ishikawa hoặc Cause-and-Effect Diagram. 6M = cách nhớ nhanh nhất."},

  {id:"pareto",appUrl:"#",name:"Pareto Chart (80/20)",type:"Tool",cats:["quality"],icon:"ti-chart-histogram",
   what:"Bar chart + cumulative line. Pareto Principle: 80% problems đến từ 20% causes. Giúp focus vào vital few.",
   when:["Prioritize defects để fix","Identify top causes sau quality review","Focus improvement efforts"],
   avoid:["Fix theo alphabetical hoặc easiest first","Ignore rare causes — đôi khi gây critical failure"],
   steps:["Collect data: defect types + frequency","Sort descending","Tính cumulative %","Draw: bars (frequency) + line (cumulative %)","Identify bars đạt ~80% cumulative","Focus vào top 20% causes"],
   combine:["fishbone","control-charts"],
   example:"100 bugs: UI 45, API 30, Perf 15, Auth 7, Others 3 → Fix UI + API = 75% → focus 2 areas.",
   pmpNote:"80/20 rule — focus on vital few, not trivial many."},

  {id:"control-charts",appUrl:"#",name:"Control Charts",type:"Tool",cats:["quality"],icon:"ti-activity",
   what:"Biểu đồ theo dõi process performance theo thời gian với UCL/LCL. Phát hiện khi process out of control.",
   when:["Monitor repetitive processes","Detect special cause variation","Quality control trong testing"],
   avoid:["Confuse Control Limits (statistical) với Specification Limits (customer)","React mọi data point — chỉ react khi out-of-control signals"],
   steps:["Define metric cần monitor","Collect data theo thời gian","Calculate mean, UCL = mean + 3σ, LCL = mean - 3σ","Plot data points","Look for signals: points ngoài limits, runs, trends","Investigate và address special causes"],
   combine:["pareto","evm"],
   pmpNote:"Out-of-control signals: 1 point ngoài UCL/LCL, hoặc 7+ consecutive points cùng phía centerline (Rule of Seven)."},

  {id:"cost-quality",name:"Cost of Quality (COQ)",type:"Tool",cats:["quality"],icon:"ti-coin",
   what:"Framework đo chi phí liên quan đến chất lượng: Prevention + Appraisal + Internal Failure + External Failure.",
   when:["Quality planning","Justify investment vào quality processes","Calculate ROI của quality improvement"],
   avoid:["Chỉ tính Appraisal costs","Ignore External Failure — thường là lớn nhất"],
   steps:["Phân loại: Prevention (training), Appraisal (testing), Internal Failure (rework), External Failure (warranty)","Collect data mỗi category","Analyze tỷ lệ: high failure = cần invest prevention","Calculate ROI: $1 prevention ≈ $10-100 saved in failure","Present để justify investment"],
   combine:["fishbone","pareto"],
   pmpNote:"PMP principle: Prevention over Inspection. COQ dùng để argue cho invest vào quality processes."},

  {id:"benchmarking",appUrl:"#",name:"Benchmarking",type:"Technique",cats:["quality"],icon:"ti-trophy",
   what:"So sánh processes/metrics với industry standards hoặc best-in-class để identify improvement opportunities.",
   when:["Set realistic quality targets","Identify process improvement opportunities","Justify process changes với data"],
   avoid:["Benchmark với wrong peers — industry khác","Implement best practices mà không adapt cho context"],
   steps:["Identify what to benchmark","Identify benchmark partners hoặc standards","Collect data (internal + external)","Analyze gaps","Develop improvement plan","Monitor progress"],
   combine:["expert-judgment","meetings"]},

  // ── RESOURCE & TEAM ──
  {id:"tuckman",appUrl:"#",name:"Tuckman Ladder",type:"Tool",cats:["resource"],icon:"ti-stairs",
   what:"5 stages phát triển team: Forming → Storming → Norming → Performing → Adjourning. PM adjust leadership style theo stage.",
   when:["Assess team dynamics","Khi team có performance issues","Onboard new members"],
   avoid:["Assume team tự nhiên reach Performing","Skip Storming — một số conflict là healthy"],
   steps:["Forming: high direction — set expectations, clarify roles, ground rules","Storming: coaching + conflict resolution — normal, không panic","Norming: support — PM step back, recognize achievements","Performing: delegate — team self-managing","Adjourning: celebrate, lessons learned"],
   combine:["coaching","conflict-resolution"],
   example:"Sprint 1-2: Forming. Sprint 3-4: Storming → facilitated session. Sprint 5+: Norming → velocity stabilizes.",
   pmpNote:"Storming không phải bad sign — là natural và necessary."},

  {id:"conflict-resolution",appUrl:"#",name:"Conflict Resolution",type:"Technique",cats:["resource","facilitation"],icon:"ti-handshake",
   what:"5 phương pháp: Collaborate, Compromise, Accommodate, Avoid, Force. Từ win-win đến lose-lose.",
   when:["Team conflicts ảnh hưởng performance","Conflicting stakeholder interests","Resource allocation disputes"],
   avoid:["Force — chỉ dùng khi safety/ethics bị đe dọa","Smooth/Avoid mà không address root cause"],
   steps:["Identify type và root cause","Assess urgency và stakes","Collaborate (preferred): tìm win-win","Compromise: cả hai nhường một phần","Accommodate: smooth tạm thời","Avoid: chỉ nếu vấn đề trivial","Force: authority-based, last resort"],
   combine:["meetings","coaching"],
   pmpNote:"GOLD RULE: Collaborate là preferred. Force là last resort. Avoid là worst choice cho important conflicts."},

  {id:"coaching",name:"Coaching & Mentoring",type:"Technique",cats:["resource","facilitation"],icon:"ti-user-heart",
   what:"Coaching: help người khác tìm giải pháp qua powerful questions. Mentoring: share experience và guidance trực tiếp.",
   when:["Team member underperforming","Skills gap","Developing next-gen PMs hoặc leads"],
   avoid:["Coaching khi cần direct instructions — dùng mentoring","Mentoring khi cần space tự giải quyết"],
   steps:["Coaching: Active listening → Powerful questions → Let them find answer → Support action","Mentoring: Share experience → Guidance → Connect to network → Check-in","Document development plan","Track progress và celebrate wins"],
   combine:["tuckman","retrospective"]},

  {id:"raci",appUrl:"#",name:"RACI Matrix",type:"Tool",cats:["resource","communication"],icon:"ti-table",
   what:"Responsibility Assignment Matrix: Responsible, Accountable, Consulted, Informed cho từng task/deliverable.",
   when:["Clarify roles và responsibilities","Khi có confusion về ai làm gì","Multi-team projects"],
   avoid:["Nhiều hơn 1 Accountable cho 1 task","Quá nhiều Consulted — tạo bottleneck","RACI quá granular"],
   steps:["List tasks/deliverables theo hàng","List roles/stakeholders theo cột","Assign R, A, C, I","Validate: mỗi task đúng 1 A","Review với team","Update khi team thay đổi"],
   combine:["wbs","meetings"],
   pmpNote:"Mỗi task: exactly 1 Accountable. R = làm, A = chịu trách nhiệm cuối cùng."},

  // ── COMMUNICATION ──
  {id:"comm-plan",name:"Communication Plan",type:"Tool",cats:["communication"],icon:"ti-mail",
   what:"Define ai cần thông tin gì, format gì, frequency bao nhiêu, channel nào, owner là ai.",
   when:["Planning phase — establish trước khi start","Onboard stakeholder mới","Communication breakdown xảy ra"],
   avoid:["One-size-fits-all cho tất cả stakeholders","Create plan rồi không follow"],
   steps:["Identify stakeholders và information needs","Define: What, When, How, Who sends","Map types: Status Report, Escalation, Meeting Minutes","Get stakeholder buy-in","Establish escalation path","Review và update khi context thay đổi"],
   combine:["seam","power-interest"],
   example:"Sponsor: weekly 1-pager. Dev: daily standup. Client: bi-weekly demo. Escalation: PM → PMO → Sponsor trong 24h."},

  {id:"info-radiators",name:"Information Radiators",type:"Tool",cats:["communication","agile"],icon:"ti-radio",
   what:"Visual displays hiển thị project info publicly và liên tục — mọi người đi ngang đều thấy: burndown, Kanban, dashboard.",
   when:["Agile/Hybrid muốn transparency","Distributed teams","Reduce status meeting overhead"],
   avoid:["Radiator đẹp nhưng không được cập nhật — tệ hơn không có","Quá nhiều metrics → overwhelmed"],
   steps:["Identify top 3–5 metrics cần nhìn daily","Choose medium: physical board hoặc digital","Place prominently","Commit to update cadence","Remove metrics không còn relevant"],
   combine:["kanban","comm-plan"]},

  {id:"kanban",name:"Kanban Board",type:"Tool",cats:["agile","communication"],icon:"ti-layout-columns",
   what:"Visual board hiển thị work items qua các stages. Giúp visualize work, limit WIP, identify bottlenecks.",
   when:["Agile/Hybrid muốn transparency","Operations/support work (continuous flow)","Identify bottlenecks"],
   avoid:["Quá nhiều columns","Không enforce WIP limits — defeats the purpose"],

/* ==========================================================
   APP STATE & INIT
   ========================================================== */
let activeFilter = "all";
let searchQuery  = "";

function openApp(url, event) {
  if (event) event.stopPropagation();
  if (url) {
    window.open(url, '_blank');
  } else {
    showToast('🚧 Trang app đang được xây dựng, chưa hoạt động');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}


function init() {
  buildStats();
  buildFilters();
  render();
  document.getElementById("si").addEventListener("input", onSearch);
}

function buildStats() {
  const total = TD.length;
  const withSteps = TD.filter(t => t.steps && t.steps.length).length;
  document.getElementById("sb").innerHTML =
    `<div class="stat-pill"><i class="ti ti-tool" style="font-size:13px"></i> <strong>${total}</strong> Tools &amp; Techniques</div>` +
    `<div class="stat-pill"><i class="ti ti-list-numbers" style="font-size:13px"></i> <strong>${withSteps}</strong> có hướng dẫn step-by-step</div>` +
    `<div class="stat-pill"><i class="ti ti-category" style="font-size:13px"></i> <strong>${CATS.length}</strong> Knowledge Areas</div>`;
}

function buildFilters() {
  let html = `<button class="fb act" onclick="setF('all',this)">All</button>`;
  CATS.forEach(c => {
    html += `<button class="fb" onclick="setF('${c.key}',this)">${c.label}</button>`;
  });
  document.getElementById("fg").innerHTML = html;
}

function setF(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll(".fb").forEach(b => b.classList.remove("act"));
  btn.classList.add("act");
  render();
}

function onSearch(e) {
  searchQuery = e.target.value.toLowerCase().trim();
  const sc = document.getElementById("sc");
  if (searchQuery.length > 0) sc.classList.add("vis"); else sc.classList.remove("vis");
  render();
}

function clearSearch() {
  document.getElementById("si").value = "";
  searchQuery = "";
  document.getElementById("sc").classList.remove("vis");
  render();
}

function render() {
  const sort = document.getElementById("ss").value;
  let list = TD.filter(t => {
    const mc = activeFilter === "all" || t.cats.includes(activeFilter);
    const ms = !searchQuery || (t.name + " " + t.what + " " + t.cats.join(" ")).toLowerCase().includes(searchQuery);
    return mc && ms;
  });
  if (sort === "alpha") list.sort((a,b) => a.name.localeCompare(b.name));
  else if (sort === "cat") list.sort((a,b) => a.cats[0].localeCompare(b.cats[0]) || a.name.localeCompare(b.name));
  else if (sort === "type") list.sort((a,b) => a.type.localeCompare(b.type) || a.name.localeCompare(b.name));

  const catLabel = CATS.find(c => c.key === activeFilter);
  const rm = document.getElementById("rm");
  if (searchQuery) rm.innerHTML = `Tìm thấy <strong>${list.length}</strong> kết quả cho "<strong>${searchQuery}</strong>"`;
  else if (activeFilter !== "all") rm.innerHTML = `<strong>${list.length}</strong> tools trong <strong>${catLabel ? catLabel.label : activeFilter}</strong>`;
  else rm.innerHTML = `Hiển thị <strong>${list.length}</strong> tools &amp; techniques`;

  const grid = document.getElementById("grid");
  if (list.length === 0) {
    grid.innerHTML = `<div class="empty"><i class="ti ti-mood-puzzled"></i><p>Không tìm thấy tool nào.<br>Thử từ khoá khác hoặc xoá filter.</p></div>`;
    return;
  }
  grid.innerHTML = list.map(t => {
    const tags = t.cats.map(c => {
      const cat = CATS.find(x => x.key === c);
      return `<span class="ct cat-${c}">${cat ? cat.label : c}</span>`;
    }).join("");
    const preview = t.what.length > 100 ? t.what.slice(0,100) + "…" : t.what;
    const appBtnHtml = t.appUrl
      ? `<button class="app-btn" onclick="openApp('${t.appUrl}',event)"><i class="ti ti-external-link" style="font-size:15px"></i>Mở App</button>`
      : ``;
    return `<div class="tc" onclick="openD('${t.id}')" role="button" tabindex="0" onkeydown="if(event.key==='Enter')openD('${t.id}')">
      <div class="ctop">
        <div class="cicon"><i class="ti ${t.icon || 'ti-tool'}"></i></div>
        <div class="cname">${t.name}</div>
        <i class="ti ti-chevron-right carr"></i>
      </div>
      <div class="ctype">${t.type}</div>
      <div class="ctags">${tags}</div>
      <div class="cwhat">${preview}</div>
      <div style="margin-top:2px">${appBtnHtml}</div>
    </div>`;
  }).join("");
}

/* ==========================================================
   DRAWER
   ========================================================== */
function openD(id) {
  const t = TD.find(x => x.id === id);
  if (!t) return;

  document.getElementById("dtit").textContent = t.name;

  const tags = t.cats.map(c => {
    const cat = CATS.find(x => x.key === c);
    return `<span class="ct cat-${c}" style="font-size:12px">${cat ? cat.label : c}</span>`;
  }).join("");
  document.getElementById("dm").innerHTML =
    `<span style="font-size:12px;color:var(--tx2);font-style:italic">${t.type}</span>` +
    `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-left:4px">${tags}</div>`;

  let h = "";

  // What
  h += `<div class="ds"><div class="dst"><i class="ti ti-info-circle"></i>Là gì?</div><div class="dsb">${t.what}</div></div>`;
  h += `<div class="dv"></div>`;

  // When
  if (t.when && t.when.length) {
    h += `<div class="ds"><div class="dst"><i class="ti ti-calendar-check"></i>Khi nào dùng</div><div class="dsb">`;
    t.when.forEach(w => { h += `<span class="dt dt-w">${w}</span>`; });
    h += `</div></div>`;
  }

  // Avoid
  if (t.avoid && t.avoid.length) {
    h += `<div class="ds"><div class="dst"><i class="ti ti-ban"></i>Cần tránh</div><div class="dsb">`;
    t.avoid.forEach(a => { h += `<span class="dt dt-a">${a}</span>`; });
    h += `</div></div>`;
  }

  // Steps
  if (t.steps && t.steps.length) {
    h += `<div class="dv"></div><div class="ds"><div class="dst"><i class="ti ti-list-numbers"></i>Cách thực hiện</div><ul class="sl">`;
    t.steps.forEach(s => { h += `<li>${s}</li>`; });
    h += `</ul></div>`;
  }

  // Combine
  if (t.combine && t.combine.length) {
    const chips = t.combine.map(cid => {
      const rel = TD.find(x => x.id === cid);
      return rel ? `<span class="dt dt-c" onclick="openD('${cid}')">${rel.name}</span>` : "";
    }).filter(Boolean).join("");
    if (chips) h += `<div class="ds"><div class="dst"><i class="ti ti-link"></i>Kết hợp với</div><div class="dsb">${chips}</div></div>`;
  }

  // Example
  if (t.example) {
    h += `<div class="dv"></div><div class="ds"><div class="dst"><i class="ti ti-bulb"></i>Ví dụ thực chiến</div><div class="ex">${t.example}</div></div>`;
  }

  // PMP Note
  if (t.pmpNote) {
    h += `<div class="ds" style="margin-top:1rem"><div class="dst"><i class="ti ti-certificate"></i>PMP Exam Note</div><div class="pmp">${t.pmpNote}</div></div>`;
  }

  // App button in drawer
  const drawerAppBtn = t.appUrl
    ? `<button class="app-btn-lg" onclick="openApp('${t.appUrl}',event)"><i class="ti ti-external-link" style="font-size:15px"></i>Mở trang App của tool này</button>`
    : ``;
  h += `<div class="dv"></div><div class="ds">${drawerAppBtn}</div>`;
  h += `<div style="padding:.5rem 0 .5rem;text-align:center"><button onclick="closeD()" style="background:transparent;border:1px solid var(--bd2);border-radius:7px;padding:8px 24px;font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;font-family:'DM Sans',sans-serif">Đóng</button></div>`;

  const db = document.getElementById("db");
  db.innerHTML = h;
  db.scrollTop = 0;
  document.getElementById("ov").classList.add("open");
}

function maybeClose(e) { if (e.target === document.getElementById("ov")) closeD(); }
function closeD() { document.getElementById("ov").classList.remove("open"); }
document.addEventListener("keydown", e => { if (e.key === "Escape") closeD(); });

init();
</script>
<div class="toast" id="toast"></div>
</body>
</html>
